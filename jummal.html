<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jummal</title>
    <!-- Bootstrap 5.3.3 RTL CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body class="p-3 p-md-4">
    <div class="container-fluid">
      <div class="row g-4">
        <div class="col-md-7">
          <div class="row g-4">
            <div class="col-12">
              <div id="jummal" class="glass-card h-100">
                <h3 class="text-center mb-3 fw-bold">حاسبة الجمل الثلاثية</h3>

                <div class="mb-3">
                  <label for="inputText">أدخل النص:</label>
                  <div class="input-group">
                    <input type="text" id="inputText" class="form-control" placeholder="">
                    <button id="calculateBtn" class="btn btn-glass" type="button">احسب</button>
                  </div>
                </div>

                <div id="result" class="result-box"></div>
              </div>
            </div>
          </div>
          <div class="row g-4">
            <div class="col-12">
              <div id="magic-squares" class="glass-card h-100">
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-5">
          <div class="glass-card h-100">
            <h4 class="text-center mb-3 fw-bold">السجل</h4>
            <div style="max-height: 440px; overflow-y: auto;">
              <table class="history-table">
                <thead>
                  <tr>
                    <th>النص</th>
                    <th>الجمل</th>
                    <th>الأبجد</th>
                    <th>الأيقغ</th>
                    <th>الحساب الثلاثي</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="historyList">
                  <!-- سيتم ملؤه ديناميكيًا -->
                </tbody>
              </table>
            </div>
            <button id="clearAllBtn" class="btn btn-clear-all w-100 mt-2">🗑️ مسح السجل كله</button>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery + Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/jummal.js"></script>

  </body>
</html>
