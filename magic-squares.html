<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wefeq 3x3</title>
    <!-- Bootstrap 5.3.3 RTL CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container-fluid">
      <div class="row">
        <div class="col-12 p-0">
          <a href="index.html" style="text-decoration: none; color: #007bff; font-size: 14px;">العودة للرئيسية</a>
        </div>
      </div>
      <div class="row mt-1 justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
              <h4>أنشئ وفقك المثلث</h4>
            </div>
            <div class="card-body">
              <div class="mb-3">
                <input type="number" id="targetSum" class="form-control text-center" placeholder="أدخل الرقم هنا" required>
              </div>
              <div class="d-grid">
                <button id="generateBtn" class="btn btn-success">أنشئ الوفق</button>
              </div>

              <div id="magicResult" class="result-section text-center d-none">
                <div id="magicSquare" class="magic-square"></div>
                <button id="toggleGuideBtn" class="btn btn-outline-primary mt-3">إظهار الدليل</button>
                <!-- ✅ جدول المعلومات الجديد (3 أعمدة) -->
                <div id="guideTable" class="table-responsive mt-4 d-none">
                  <table class="info-table">
                    <thead>
                      <tr>
                        <th>الاسم</th>
                        <th>الشرح</th>
                        <th>القيمة</th>
                      </tr>
                    </thead>
                    <tbody id="infoTableBody">
                      <!-- سيتم ملؤه ديناميًا -->
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/magicsquares.js"></script>

  </body>
</html>
