name: Deploy to cPanel

on:
  push:
    branches: [ "main" ] # غيّر إلى الفرع الذي تريد النشر التلقائي منه
workflow_dispatch:  # ← أضف هذا السطر بالضبط
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 جلب الكود
        uses: actions/checkout@v4

      - name: 📤 النشر إلى cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ${{ secrets.FTP_PROTOCOL }}
          secure: false
          local-dir: ./
          server-dir: /public_html/s/jummal/
          exclude: |
            .git*
            .github/**
            node_modules/**
            *.log
            .env
            *.map
