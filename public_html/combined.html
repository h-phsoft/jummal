<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>حاسبة الجمل الثلاثية</title>
    <!-- Bootstrap 5.3.3 RTL CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body class="p-3 p-md-4">
    <div class="container-fluid">
      <div class="row g-4">
        <div class="col-md-7">
          <div class="row g-4">
            <div class="col-12">
              <div id="jummal" class="glass-card h-100">
                <div class="mb-3">
                  <label for="inputText">أدخل النص:</label>
                  <div class="input-group">
                    <input type="text" id="inputText" class="form-control" placeholder="">
                    <button id="calculateBtn" class="btn btn-glass" type="button">احسب</button>
                  </div>
                </div>

                <div id="jummalResult" class="result-box"></div>
              </div>
            </div>
          </div>
          <div class="row g-4 mt-2">
            <div class="col-10 mx-auto">
              <div id="magic-squares" class="glass-card h-100">
                <div class="card shadow">
                  <div class="card-body">
                    <div class="mb-3">
                      <input type="number" id="targetSum" class="form-control text-center" placeholder="أدخل الرقم هنا" required>
                    </div>
                    <div class="d-grid position-relative">
                      <button id="generateBtn" class="btn btn-success">أنشئ الوفق</button>
                      <span id="fractionIndicator" class="position-absolute top-0 start-100 translate-middle badge rounded-circle ms-2" style="width: 12px; height: 12px; background-color: gray;"></span>
                    </div>

                    <div id="magicResult" class="result-section text-center d-none">
                      <div id="magicSquare" class="magic-square"></div>
                      <button id="toggleGuideBtn" class="btn btn-outline-primary mt-3">إظهار الدليل</button>
                      <!-- ✅ جدول المعلومات الجديد (3 أعمدة) -->
                      <div id="guideTable" class="table-responsive mt-4 d-none">
                        <table class="info-table">
                          <thead>
                            <tr>
                              <th>الاسم</th>
                              <th>الشرح</th>
                              <th>القيمة</th>
                            </tr>
                          </thead>
                          <tbody id="infoTableBody">
                            <!-- سيتم ملؤه ديناميًا -->
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-5">
          <div class="glass-card h-100">
            <h4 class="text-center mb-3 fw-bold">السجل</h4>
            <div style="max-height: 440px; overflow-y: auto;">
              <table class="history-table">
                <thead>
                  <tr>
                    <th>النص</th>
                    <th>الجمل</th>
                    <th>الأبجد</th>
                    <th>الأيقغ</th>
                    <th>الحساب الثلاثي</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="historyList">
                  <!-- سيتم ملؤه ديناميكيًا -->
                </tbody>
              </table>
            </div>
            <button id="clearAllBtn" class="btn btn-clear-all w-100 mt-2">🗑️ مسح السجل كله</button>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery + Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/jummal.js"></script>
    <script src="assets/js/magicsquares.js"></script>

  </body>
</html>
