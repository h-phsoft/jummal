<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jummal | Wefeq 3x3</title>
    <!-- Bootstrap 5.3.3 RTL CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body class="p-3 p-md-4">
    <div class="container-fluid">
      <div class="row g-4">
        <div class="col-md-7">
          <div class="row g-4">
            <div class="col-12">
              <div id="jummal" class="glass-card h-100">
                <div class="mb-3">
                  <label for="inputText">أدخل النص:</label>
                  <div class="input-group">
                    <input type="text" id="inputText" class="form-control" placeholder="">
                    <button id="calculateBtn" class="btn btn-glass" type="button">احسب</button>
                  </div>
                </div>
                <div id="jummalResult" class="result-box"></div>
              </div>
            </div>
          </div>
          <div class="row g-4 mt-2">
            <div class="col-10 mx-auto">
              <div id="magic-squares" class="glass-card h-100">
                <div class="card shadow">
                  <div class="card-body">
                    <div class="mb-3">
                      <div class="row g-2 align-items-center">
                        <div class="col-10">
                          <input type="number" id="targetSum" class="form-control text-center" placeholder="أدخل الرقم هنا" required>
                        </div>
                        <div class="col-1">
                          <span id="fractionIndicator" class="fraction-indicator-circle d-block mx-auto"></span>
                        </div>
                      </div>
                    </div>
                    <div class="mb-3">
                      <button id="generateBtn" class="btn btn-success w-100">أنشئ الوفق</button>
                    </div>
                    <div id="magicResult" class="result-section text-center d-none">
                      <div id="magicSquare" class="magic-square"></div>
                      <button id="toggleGuideBtn" class="btn btn-outline-primary mt-3">إظهار الدليل</button>
                      <!-- ✅ جدول المعلومات الجديد (3 أعمدة) -->
                      <div id="guideTable" class="table-responsive mt-4 d-none">
                        <table class="info-table">
                          <thead>
                            <tr>
                              <th>الاسم</th>
                              <th>الشرح</th>
                              <th>القيمة</th>
                            </tr>
                          </thead>
                          <tbody id="infoTableBody">
                            <!-- سيتم ملؤه ديناميًا -->
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <!-- قسم البحث في QWords.json -->
          <div class="row g-4 mt-2">
            <div class="col-12">
              <div class="glass-card">
                <h5 class="mb-3 fw-bold">البحث في الكلمات</h5>
                
                <!-- حقل إدخال الرقم -->
                <div class="mb-3">
                  <div class="input-group">
                    <input type="number" id="searchNumber" class="form-control" placeholder="أدخل الرقم للبحث...">
                    <button onclick="performSearch()" class="btn btn-success" type="button">بحث</button>
                  </div>
                </div>
                
                <!-- Checkboxes للبحث -->
                <div class="mb-3">
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="checkJummal" checked>
                    <label class="form-check-label" for="checkJummal">جمل</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="checkAbjad">
                    <label class="form-check-label" for="checkAbjad">أبجد</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="checkAyqagh">
                    <label class="form-check-label" for="checkAyqagh">أيقغ</label>
                  </div>
                </div>
                
                <!-- نتيجة البحث -->
                <div id="matched-numbers" style="max-height: 30vh; overflow-y: auto;">
                  <table class="history-table" id="searchResultsTable">
                    <thead>
                      <tr id="search-results-header">
                        <th>الكلمة (Text) <span id="totalCount"></span></th>
                        <th>حساب الجمل (Jummal) <span id="jummalCount"></span></th>
                        <th>حساب الأبجد (Abjad) <span id="abjadCount"></span></th>
                        <th>حساب الأيقغ (Ayqagh) <span id="ayqaghCount"></span></th>
                      </tr>
                    </thead>
                    <tbody id="searchResultsBody">
                      <tr><td colspan="4" class="text-center text-muted py-3">أدخل رقماً واضغط بحث للعثور على كلمات مطابقة</td></tr>
                    </tbody>
                  </table>
                  <div id="noResultsMsg" class="text-center text-muted py-3" style="display: none;">لا توجد نتائج مطابقة</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-5">
          <div class="glass-card h-100">
            <h4 class="text-center mb-3 fw-bold">السجل</h4>
            <div style="max-height: 440px; overflow-y: auto;">
              <table class="history-table">
                <thead>
                  <tr>
                    <th>النص</th>
                    <th>الجمل</th>
                    <th>الأبجد</th>
                    <th>الأيقغ</th>
                    <th>الحساب الثلاثي</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="historyList">
                  <!-- سيتم ملؤه ديناميكيًا -->
                </tbody>
              </table>
            </div>
            <button id="clearAllBtn" class="btn btn-clear-all w-100 mt-2">🗑️ مسح السجل كله</button>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery + Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/jummal.js"></script>
    <script src="assets/js/magicsquares.js"></script>
    <script src="assets/js/search.js"></script>

  </body>
</html>
