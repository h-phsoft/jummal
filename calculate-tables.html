<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jummal | Customized Tables</title>
    <link href="assets/vendors/bootstrap/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="assets/vendors/bootstrap/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/vendors/bootstrap/ph-bootstrap-colors.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <style>
        .table-selector-container { max-height: 200px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 5px; padding: 10px; background: #fff; }
        .result-word-col { min-width: 80px; text-align: center; vertical-align: middle; font-weight: bold; color: #0d6efd; }
        .word-header { font-size: 0.9rem; color: #6c757d; }
        #calculationDisplay { font-size: 1.2rem; font-weight: bold; color: #198754; margin: 10px 0; min-height: 1.5em; }
        .toggle-btn { cursor: pointer; user-select: none; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
  </head>
  <body class="p-3 p-md-4">
    <div class="container-fluid">
      <div class="row">
        <div class="col-3 p-0">
          <a href="index.html" style="text-decoration: none; color: #007bff; font-size: 14px;">العودة للرئيسية</a>
        </div>
        <div class="col-6 p-0">
          <h3 class="text-center mb-3 fw-bold">حساب الجداول المخصصة</h3>
        </div>
        <div class="col-3 p-0">
        </div>
      </div>

      <!-- القسم العلوي: الإدخال والسجل -->
      <div class="row g-4 mt-3">
        <!-- عمود الإدخال واختيار الجداول -->
        <div class="col-md-4">
          <div class="glass-card h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold mb-0">إعدادات الحساب</h4>
                <button class="btn btn-sm btn-outline-secondary toggle-btn" onclick="toggleTableSelector()">
                    <span id="toggleIcon">▼</span> اختر الجداول
                </button>
            </div>
            
            <!-- منطقة اختيار الجداول (قابلة للطي) -->
            <div id="tableSelectorBox" class="table-selector-container mb-3">
                <div class="mb-2">
                    <input type="text" id="searchTable" class="form-control form-control-sm" placeholder="بحث عن جدول..." onkeyup="filterTables()">
                </div>
                <div class="tables-list-container" style="max-height: 150px; overflow-y: auto; border: none; padding: 0;">
                  <table class="tables-list-table">
                    <thead>
                      <tr>
                        <th>تحديد</th>
                        <th>اسم الجدول</th>
                      </tr>
                    </thead>
                    <tbody id="tablesCheckboxes">
                      <!-- سيتم ملئه ديناميكيًا من tablesData -->
                    </tbody>
                  </table>
                </div>
            </div>

            <div class="mb-3">
              <div class="input-group">
                <input type="text" id="inputText" class="form-control text-center" placeholder="أدخل النص">
                <button id="calculateBtn" class="btn btn-glass" type="button">احسب العبارة</button>
              </div>
            </div>
            
            <div id="calculationDisplay"></div>
          </div>
        </div>

        <!-- عمود سجل العمليات (History) -->
        <div class="col-md-8">
          <div class="glass-card h-100">
            <h4 class="text-center mb-3 fw-bold">السجل</h4>
            <div style="max-height: 440px; overflow-y: auto;">
              <table class="history-table w-100">
                <thead>
                  <tr>
                    <th style="width: 10%">#</th>
                    <th>النص المحسوب</th>
                    <th style="width: 15%">الإجراء</th>
                  </tr>
                </thead>
                <tbody id="historyList">
                  <!-- سيتم ملئه ديناميكيًا -->
                </tbody>
              </table>
            </div>
            <button id="clearAllBtn" class="btn btn-clear-all w-100 mt-2">🗑️ مسح السجل كله</button>
          </div>
        </div>
      </div>

      <!-- القسم السفلي: النتائج التفصيلية -->
      <div class="row g-4 mt-3">
        <div class="col-12">
          <div class="glass-card">
            <h4 class="text-center mb-3 fw-bold">النتائج التفصيلية</h4>
            <div class="table-responsive">
                <table class="table table-bordered table-hover text-center align-middle" id="resultTable">
                    <thead class="table-dark">
                        <tr id="resultHeaderRow">
                            <th rowspan="2" style="vertical-align: middle;">اسم الجدول</th>
                            <th rowspan="2" style="vertical-align: middle;">العنوان / القيمة الكلية</th>
                            <!-- أعمدة الكلمات ستضاف هنا ديناميكياً -->
                        </tr>
                        <tr id="wordsHeaderRow" class="table-light">
                            <!-- رؤوس الكلمات -->
                        </tr>
                    </thead>
                    <tbody id="resultTableBody">
                        <!-- صفوف النتائج -->
                    </tbody>
                </table>
            </div>
            <div id="noResultMsg" class="text-center text-muted py-4">
                لم يتم حساب أي عبارات بعد. أدخل نصاً واضغط "احسب".
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- jQuery + Bootstrap JS -->
    <script src="assets/vendors/jquery/jquery.min.js"></script>
    <script src="assets/vendors/bootstrap/js/bootstrap.bundle.min.js"></script>
    <!-- SheetJS for Excel export -->
    <script src="assets/vendors/sheetjs/xlsx.full.min.js"></script>
    <script src="assets/js/data/tables-data.js"></script>
    <script src="assets/js/calculate-tables.js"></script>

    <script>
        // دالة مساعدة لإظهار/إخفاء قائمة الجداول
        function toggleTableSelector() {
            const box = document.getElementById('tableSelectorBox');
            const icon = document.getElementById('toggleIcon');
            if (box.style.display === 'none') {
                box.style.display = 'block';
                icon.innerHTML = '▼';
            } else {
                box.style.display = 'none';
                icon.innerHTML = '▲';
            }
        }
    </script>

  </body>
</html>
