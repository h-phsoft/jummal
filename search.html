<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumma | Search by Number</title>
    <link href="assets/vendors/bootstrap/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="assets/vendors/bootstrap/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/vendors/bootstrap/ph-bootstrap-colors.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body class="p-3 p-md-4">
    <div class="container-fluid">
      <div class="row">
        <div class="col-3 p-0">
          <a href="index.html" style="text-decoration: none; color: #007bff; font-size: 14px;">العودة للرئيسية</a>
        </div>
        <div class="col-6 p-0">
          <h3 class="text-center mb-3 fw-bold">بحث عن رقم في الكلمات</h3>
        </div>
        <div class="col-3 p-0">
        </div>
      </div>
      <div class="row mt-1 justify-content-center">
        <div class="col-5 mx-auto p-0 text-center">
          <div class="card mt-1">
            <div class="card-body">
              <div class="row mt-1 justify-content-center">
                <div class="col-6 mx-auto">
                  <div class="input-group">
                    <input type="number" id="searchNumber" class="form-control text-center" placeholder="أدخل الرقم...">
                    <button onclick="performSearch()" class="btn btn-glass" type="button">احسب</button>
                  </div>
                </div>
              </div>

              <div class="checkbox-group">
                <label class="checkbox-label">
                  <input type="checkbox" id="checkJummal" checked>
                  الجمل
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="checkAbjad">
                  الأبجد
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="checkAyqagh">
                  الأيقغ
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-6 mx-auto mt-2 text-center">
          <div class="table-wrapper text-center">
            <table id="resultsTable" class="results-table">
              <thead>
                <tr>
                  <th>الكلمة<span id="totalCount"></span></th>
                  <th>الجمل<span id="jummalCount"></span></th>
                  <th>الأبجد<span id="abjadCount"></span></th>
                  <th>الأيقغ<span id="ayqaghCount"></span></th>
                </tr>
              </thead>
              <tbody>
                <!-- النتائج ستظهر هنا -->
              </tbody>
            </table>
            <div id="noResultsMsg" class="no-results" style="display: none;">لا توجد نتائج مطابقة</div>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery + Bootstrap JS -->
    <script src="assets/vendors/jquery/jquery.min.js"></script>
    <script src="assets/vendors/bootstrap/js/bootstrap.bundle.min.js"></script>
    <!-- SheetJS for Excel export -->
    <script src="assets/vendors/sheetjs/xlsx.full.min.js"></script>
    <script src="assets/js/data/qwords-data.js"></script>
    <script src="assets/js/search.js"></script>
  </body>
</html>
