<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث في الكلمات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-12 p-0 text-start">
          <a href="index.html" style="text-decoration: none; color: #007bff; font-size: 14px;">العودة للرئيسية</a>
        </div>
      </div>

      <div class="row">
        <div class="col-5 mx-auto p-0 text-center">
          <div class="card mt-1">
            <div class="card-body">
              <h2>بحث حسب القيمة الحسابية</h2>
              <input type="number" id="searchNumber" class="search-input" placeholder="أدخل الرقم...">
              <button onclick="performSearch()" class="search-btn">بحث</button>

              <div class="checkbox-group">
                <label class="checkbox-label">
                  <input type="checkbox" id="checkJummal" checked>
                  الجمل
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="checkAbjad">
                  الأبجد
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="checkAyqagh">
                  الأيقغ
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-6 mx-auto mt-2 text-center">
          <div class="table-wrapper text-center">
            <table id="resultsTable" class="results-table">
              <thead>
                <tr>
                  <th>الكلمة (Text) <span id="totalCount"></span></th>
                  <th>حساب الجمل (Jummal) <span id="jummalCount"></span></th>
                  <th>حساب الأبجد (Abjad) <span id="abjadCount"></span></th>
                  <th>حساب الأيقغ (Ayqagh) <span id="ayqaghCount"></span></th>
                </tr>
              </thead>
              <tbody>
                <!-- النتائج ستظهر هنا -->
              </tbody>
            </table>
            <div id="noResultsMsg" class="no-results" style="display: none;">لا توجد نتائج مطابقة</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/search.js"></script>
  </body>
</html>
