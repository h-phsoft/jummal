<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumma | Wefeq 8x8</title>
    <link href="assets/vendors/bootstrap/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="assets/vendors/bootstrap/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
    <link href="assets/vendors/bootstrap/ph-bootstrap-colors.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
  </head>
  <body class="p-3 p-md-4">
    <div class="container-fluid">
      <div class="row">
        <div class="col-3 p-0">
          <a href="index.html" style="text-decoration: none; color: #007bff; font-size: 14px;">العودة للرئيسية</a>
        </div>
        <div class="col-6 p-0">
          <h3 class="text-center mb-3 fw-bold">تعمير الوفق المثمن</h3>
        </div>
        <div class="col-3 p-0">
        </div>
      </div>
      <div class="row mt-1 justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow">
            <div class="card-body">
              <div class="mb-3">
                <input type="number" id="targetSum" class="form-control text-center" placeholder="أدخل الرقم هنا" required>
              </div>
              <div class="d-grid">
                <button id="generateBtn" class="btn btn-success">أنشئ الوفق</button>
              </div>

              <div id="magicResult" class="result-section text-center d-none">
                <div id="magicSquare" class="magic-square grid-8x8"></div>
                <button id="toggleGuideBtn" class="btn btn-outline-primary mt-3">إظهار الدليل</button>
                <!-- ✅ جدول المعلومات الجديد (3 أعمدة) -->
                <div id="guideTable" class="table-responsive mt-4 d-none">
                  <table class="info-table">
                    <thead>
                      <tr>
                        <th>الاسم</th>
                        <th>الشرح</th>
                        <th>القيمة</th>
                      </tr>
                    </thead>
                    <tbody id="infoTableBody">
                      <!-- سيتم ملؤه ديناميًا -->
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery + Bootstrap JS -->
    <script src="assets/vendors/jquery/jquery.min.js"></script>
    <script src="assets/vendors/bootstrap/js/bootstrap.bundle.min.js"></script>
    <!-- SheetJS for Excel export -->
    <script src="assets/vendors/sheetjs/xlsx.full.min.js"></script>
    <script src="assets/js/magicsquares.js"></script>

  </body>
</html>
